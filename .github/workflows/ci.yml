---
name: Lint & Verify

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install ansible ansible-lint yamllint
      - name: yamllint
        run: yamllint -c .yamllint.yml ansible/
      - name: ansible-lint
        run: cd ansible && ansible-lint playbook.yml
      - name: Ansible syntax-check
        run: cd ansible && ansible-playbook playbook.yml --syntax-check

  chezmoi-verify:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
      - name: Verify templates
        run: chezmoi init --source=home/ --dry-run --verbose
