---
- name: Validate OS family is supported
  ansible.builtin.assert:
    that:
      - ansible_os_family in ['Darwin', 'Debian']
    fail_msg: "Unsupported OS family: {{ ansible_os_family }}. Only Darwin (macOS) and Debian (Ubuntu) are supported."

- name: Check git is available
  ansible.builtin.command: git --version
  changed_when: false

- name: Check curl is available
  ansible.builtin.command: curl --version
  changed_when: false
