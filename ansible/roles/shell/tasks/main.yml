---
- name: Install oh-my-zsh
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ home_path }}/.oh-my-zsh"
    clone: true
    update: true
    version: master

- name: Ensure zsh is default shell
  ansible.builtin.user:
    name: "{{ username }}"
    shell: /bin/zsh
  become: true

- name: Install Spaceship zsh theme
  ansible.builtin.git:
    repo: https://github.com/denysdovhan/spaceship-prompt.git
    dest: "{{ home_path }}/.oh-my-zsh/custom/themes/spaceship-prompt"
    clone: true
    update: true
    force: true
    depth: 1
    version: master

- name: Create Spaceship theme symlink
  ansible.builtin.file:
    src: "{{ home_path }}/.oh-my-zsh/custom/themes/spaceship-prompt/spaceship.zsh-theme"
    dest: "{{ home_path }}/.oh-my-zsh/themes/spaceship.zsh-theme"
    state: link
    force: true

- name: Install oh-my-zsh plugins
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ home_path }}/.oh-my-zsh/custom/plugins/{{ item.name }}"
    clone: true
    update: true
    force: true
    version: "{{ item.version }}"
  loop: "{{ shell_omz_plugins }}"
